    .header {

    .header__title {

      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .header__subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .tools {
      position: sticky;
      top: 0;
      z-index: 2;
      border-block: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 94%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tools__inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 260px) auto;
      align-items: center;
      gap: 12px;
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 14px 24px;
    }

    .search,
    .author-filter {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elev);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search {
      padding: 10px 12px;
    }

    .author-filter {
      padding: 10px 34px 10px 12px;
    }

    .search:focus,
    .author-filter:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .tools__count {
      color: var(--text-light);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .quotes {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 8px 24px 72px;
    }

    .quote {
      margin: 0;
      padding: 30px 0 28px;
      border-top: 1px solid var(--border);
      scroll-margin-top: 92px;
    }

    .quote:first-child {
      border-top: 0;
    }

    .quote.is-hidden {
      display: none;
    }

    .quote__text {
      margin: 0;
      max-width: 64ch;
      color: var(--text);
      font-family: var(--font-serif);
      font-size: 1.28rem;
      font-weight: 400;
      line-height: 1.58;
      letter-spacing: 0;
      overflow-wrap: break-word;
    }

    .quote--short .quote__text {
      font-size: 1.42rem;
      line-height: 1.48;
    }

    .quote__author {
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: normal;
      line-height: 1.45;
    }

    .empty {
      display: none;
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 56px 24px 72px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    @media (max-width: 640px) {
      .header {
        padding: 26px 18px 20px;
      }

      .header__title {
        font-size: 2.15rem;
      }

      .tools {
        position: static;
      }

      .tools__inner {
        grid-template-columns: 1fr;
        padding: 12px 18px;
      }

      .tools__count {
        justify-self: start;
      }

      .quotes {
        padding: 4px 18px 56px;
      }

      .quote {
        padding: 25px 0 24px;
      }

      .quote__text,
      .quote--short .quote__text {
        font-size: 1.18rem;
        line-height: 1.6;
      }
    }
  </style>

  <p class="empty" id="empty">No quotes match that filter.</p>

  <script>
    (function() {
      const searchInput = document.getElementById('search');
      const authorFilter = document.getElementById('author-filter');
      const count = document.getElementById('count');
      const empty = document.getElementById('empty');
      const quotes = Array.from(document.querySelectorAll('.quote'));

      function normalize(value) {
        return String(value || '').trim().toLowerCase();
      }

      function renderCount(visible) {
        count.textContent = visible === 1 ? '1 quote' : visible + ' quotes';
      }

      function applyFilters() {
        const query = normalize(searchInput.value);
        const author = normalize(authorFilter.value);
        let visible = 0;

        quotes.forEach((quote) => {
          const matchesQuery = !query || quote.dataset.search.includes(query);
          const matchesAuthor = !author || quote.dataset.author === author;
          const show = matchesQuery && matchesAuthor;
          quote.classList.toggle('is-hidden', !show);
          if (show) visible += 1;
        });

        renderCount(visible);
        empty.classList.toggle('is-visible', visible === 0);
      }

      searchInput.addEventListener('input', applyFilters);
      authorFilter.addEventListener('change', applyFilters);
      applyFilters();
    })();
  </script>
