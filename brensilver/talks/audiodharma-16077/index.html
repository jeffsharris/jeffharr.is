<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helplessness and Power - Matthew Brensilver Dharma Talks</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfaf4;
      --ink: #20231f;
      --muted: #5d665e;
      --line: #d9d4c7;
      --accent: #285f52;
      --panel: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111816;
        --ink: #eef2ed;
        --muted: #b2beb6;
        --line: #39443f;
        --accent: #8ec7ba;
        --panel: #18211e;
      }
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 17px/1.55 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 34px 20px 64px;
    }
    a { color: var(--accent); font-weight: 750; }
    .back { display: inline-block; margin-bottom: 28px; }
    h1 { margin: 0; font-size: clamp(2rem, 7vw, 4.2rem); line-height: 1; letter-spacing: 0; }
    h2 { margin-top: 34px; }
    .meta {
      margin: 10px 0 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 280px);
      gap: 24px;
      align-items: start;
    }
    .art {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    audio { width: 100%; margin: 22px 0; }
    section { border-top: 1px solid var(--line); margin-top: 26px; padding-top: 8px; }
    .chapters { padding-left: 24px; }
    .chapters li { margin: 12px 0; }
    .description { max-width: 680px; }
    @media (max-width: 760px) {
      .hero { grid-template-columns: 1fr; }
      .art { max-width: 260px; }
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../">Matthew Brensilver Dharma Talks</a>
    <div class="hero">
      <div>
        <h1>Helplessness and Power</h1>
        <div class="meta">
          <span>AudioDharma</span>
          <span>14:05</span>
          <span>2022-04-11</span>
        </div>
        <p class="description">AudioDharma talk by Matthew Brensilver.</p>
      </div>
      <img class="art" src="https://audiodharma.us-east-1.linodeobjects.com/speakers/231/MatthewBrensilver_small.jpg" alt="">
    </div>
    <audio id="audio" controls preload="metadata" src="https://audiodharma.us-east-1.linodeobjects.com/talks/16077/20220411-Matthew_Brensilver-IMC-helplessness_and_power.mp3"></audio>
    
    <section>
      <h2>Source</h2>
      <p><a href="https://www.audiodharma.org/talks/16077">Original talk page</a></p>
    </section>
  </main>
  <script>
    const audio = document.getElementById('audio');
    function seekFromLocation() {
      const value = new URLSearchParams(location.search).get('t');
      const seconds = Number(value || 0);
      if (Number.isFinite(seconds) && seconds > 0) {
        audio.currentTime = seconds;
      }
    }
    document.querySelectorAll('[data-start]').forEach(link => {
      link.addEventListener('click', event => {
        event.preventDefault();
        const seconds = Number(link.dataset.start || 0);
        history.replaceState(null, '', '?t=' + Math.round(seconds));
        audio.currentTime = seconds;
        audio.play().catch(() => {});
      });
    });
    audio.addEventListener('loadedmetadata', seekFromLocation, { once: true });
  </script>
</body>
</html>
