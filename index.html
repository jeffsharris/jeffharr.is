<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff Harris</title>
  <meta name="description" content="Building things, raising humans, tending my inner and outer worlds.">
  <link rel="canonical" href="https://jeffharr.is/">

  <meta property="og:title" content="Jeff Harris">
  <meta property="og:description" content="Building things, raising humans, tending my inner and outer worlds.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jeffharr.is/">
  <meta property="og:image" content="https://jeffharr.is/images/jeff-editorial-portrait.jpg">
  <meta property="og:image:secure_url" content="https://jeffharr.is/images/jeff-editorial-portrait.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="640">
  <meta property="og:image:height" content="640">
  <meta property="og:image:alt" content="Jeff Harris">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Jeff Harris">
  <meta name="twitter:description" content="Building things, raising humans, tending my inner and outer worlds.">
  <meta name="twitter:image" content="https://jeffharr.is/images/jeff-editorial-portrait.jpg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Jeff Harris">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css?v=11">
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <span class="theme-toggle__icon"></span>
  </button>

  <main class="page-shell">
    <header class="hero">
      <span class="hero__portrait-halo" aria-hidden="true"></span>
      <img class="hero__portrait" src="/images/jeff-editorial-portrait.jpg" alt="Jeff Harris" width="160" height="160">
      <span class="hero__eyebrow">Jeff Harris</span>
      <h1 class="hero__tagline">
        Building things, raising humans, tending my <em>inner and outer worlds</em>.
      </h1>
      <p class="hero__bio">
        Currently building <a href="https://openai.com/codex/" target="_blank" rel="noopener">Codex</a> @OpenAI
      </p>
    </header>

    <section class="section section--collections" aria-labelledby="collections-title">
      <h2 class="section__eyebrow" id="collections-title"><span>Collections</span></h2>
      <div class="collections-grid">
        <a class="collection-tile collection-tile--poems" href="/poems/">
          <div class="collection-tile__image-wrap">
            <img class="collection-tile__image" src="/images/collections/poems-tile.jpg" alt="" decoding="async">
          </div>
          <div class="collection-tile__caption">
            <h3 class="collection-tile__name">Poems</h3>
          </div>
        </a>

        <a class="collection-tile collection-tile--quotes" href="/quotes/">
          <div class="collection-tile__image-wrap">
            <img class="collection-tile__image" src="/images/collections/quotes-tile.jpg?v=3" alt="" decoding="async">
          </div>
          <div class="collection-tile__caption">
            <h3 class="collection-tile__name">Quotes</h3>
          </div>
        </a>

        <a class="collection-tile collection-tile--dharma" href="/dharma/">
          <div class="collection-tile__image-wrap">
            <img class="collection-tile__image" src="/images/collections/dharma-tile.jpg" alt="" decoding="async">
          </div>
          <div class="collection-tile__caption">
            <h3 class="collection-tile__name">Dharma</h3>
          </div>
        </a>

        <a class="collection-tile collection-tile--read-later" href="/read-later/">
          <div class="collection-tile__image-wrap">
            <img class="collection-tile__image" src="/images/collections/read-later-tile.jpg" alt="" decoding="async">
          </div>
          <div class="collection-tile__caption">
            <h3 class="collection-tile__name">Read Later</h3>
          </div>
        </a>
      </div>
    </section>

    <section class="section section--lately" id="lately" aria-labelledby="lately-title">
      <h2 class="section__eyebrow" id="lately-title"><span>Lately</span></h2>
      <div class="lately-grid" data-lately-grid aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    <h2 class="section__eyebrow section__eyebrow--footer"><span>Elsewhere</span></h2>
    <nav class="elsewhere" aria-label="Elsewhere on the web">
      <a href="https://wakingpatiently.substack.com" target="_blank" rel="noopener">Substack</a>
      <span class="elsewhere__dot" aria-hidden="true"></span>
      <a href="https://www.linkedin.com/in/jeffreysharris" target="_blank" rel="noopener">LinkedIn</a>
      <span class="elsewhere__dot" aria-hidden="true"></span>
      <a href="https://www.youtube.com/@jeffsharris" target="_blank" rel="noopener">YouTube</a>
      <span class="elsewhere__dot" aria-hidden="true"></span>
      <a href="https://instagram.com/jeffsharris/" target="_blank" rel="noopener">Instagram</a>
    </nav>
  </footer>

  <script src="/js/main.js?v=3"></script>
  <script src="/js/lately.js?v=7"></script>
  <script src="/js/admin-presence.js?v=2"></script>
</body>
</html>
