<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alan Watts</title>
  <link rel="alternate" type="application/rss+xml" title="Alan Watts" href="feed.xml">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f7f3;
      --ink: #1f2933;
      --muted: #52616b;
      --line: #d8d2c4;
      --accent: #226f63;
      --accent-strong: #174f47;
      --rust: #a15c38;
      --gold: #b28a31;
      --blue: #3d6c93;
      --panel: #ffffff;
      --shadow: rgba(31, 41, 51, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111816;
        --ink: #eef2ed;
        --muted: #b2beb6;
        --line: #39443f;
        --accent: #79b7aa;
        --accent-strong: #9fd7cc;
        --rust: #d38a67;
        --gold: #dfbd64;
        --blue: #8ab5da;
        --panel: #18211e;
        --shadow: rgba(0, 0, 0, 0.32);
      }
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    .page-shell {
      min-height: 100vh;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 22px 72px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 8vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: 0;
    }
    h2 {
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      line-height: 1.1;
      letter-spacing: 0;
      margin: 0 0 8px;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
    }
    a {
      color: var(--accent);
      font-weight: 700;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 280px);
      gap: 34px;
      align-items: center;
      padding-bottom: 42px;
    }
    .portrait {
      justify-self: end;
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: 0 18px 48px var(--shadow);
    }
    .archive-query {
      display: grid;
      margin: 20px 0 12px;
    }
    .scope-chip,
    .starred-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 10px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 850;
      line-height: 1;
      white-space: nowrap;
    }
    .scope-chip.is-active,
    .starred-toggle.is-active {
      background: var(--accent-strong);
      color: #ffffff;
      box-shadow: none;
    }
    .starred-toggle {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 78%, var(--bg));
      color: var(--accent);
    }
    .result-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: baseline;
      justify-content: space-between;
      margin: 4px 0 12px;
    }
    .result-bar p {
      margin: 0;
    }
    .subscribe-current {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(320px, 2fr);
      gap: 18px;
      align-items: center;
      margin: 22px 0 24px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .subscribe-current h3 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .subscribe-copy {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .listen-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
    }
    .listen-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 14px;
      border: 0;
      border-radius: 6px;
      background: var(--accent-strong);
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-size: 0.96rem;
      font-weight: 800;
      text-decoration: none;
    }
    .listen-badge img {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }
    .listen-badge.pocket { background: #d9443f; }
    .listen-badge.apple { background: #872ec4; }
    .listen-badge.youtube { background: #c4302b; }
    .copy-status {
      min-height: 1.4em;
      margin: 8px 0 0;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 700;
    }
    .archive {
      border-top: 1px solid var(--line);
      margin-top: 34px;
      padding-top: 34px;
    }
    .archive-kicker {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .archive-copy {
      max-width: 620px;
      margin: 0 0 22px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .archive-search {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 100%;
      min-height: 58px;
      box-sizing: border-box;
      padding: 9px 10px 9px 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 88%, var(--bg));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }
    .archive-search::before,
    .archive-search::after {
      position: absolute;
      content: "";
      pointer-events: none;
    }
    .archive-search::before {
      top: calc(50% - 10px);
      left: 17px;
      width: 13px;
      height: 13px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      opacity: 0.86;
    }
    .archive-search::after {
      top: calc(50% + 4px);
      left: 30px;
      width: 9px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
      transform: rotate(45deg);
      transform-origin: left center;
      opacity: 0.86;
    }
    .archive-search input {
      flex: 1 1 0;
      width: 0;
      min-width: 0;
      min-height: 36px;
      box-sizing: border-box;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 1.02rem;
      outline: none;
    }
    .archive-search input::placeholder {
      color: color-mix(in srgb, var(--muted) 78%, transparent);
    }
    .archive-search:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .archive-filter-pills {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }
    .scope-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel) 72%, var(--bg));
    }
    .archive-search-status {
      justify-self: end;
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .talk-list {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }
    .talk-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 86%, var(--bg));
    }
    .talk-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    .talk-card h3 {
      margin: 0;
      font-size: 1.14rem;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .talk-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 7px 0 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .talk-card-description {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }
    .talk-card-player {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }
    .talk-card-player audio {
      width: 100%;
      min-width: 0;
    }
    .talk-card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-width: 0;
    }
    .archive-link,
    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      background: color-mix(in srgb, var(--panel) 78%, var(--bg));
    }
    .talk-loader {
      min-height: 56px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
    @media (max-width: 640px) {
      .archive-search {
        gap: 8px;
        padding: 8px 8px 8px 42px;
      }
      .archive-search::before { left: 14px; }
      .archive-search::after { left: 27px; }
      .archive-search input {
        font-size: 0.96rem;
      }
      .archive-filter-pills { gap: 4px; }
      .scope-switch {
        gap: 2px;
        padding: 2px;
      }
      .scope-chip,
      .starred-toggle {
        min-height: 30px;
        padding: 0 7px;
        font-size: 0.72rem;
      }
    }
    @media (max-width: 760px) {
      .archive-search-status { justify-self: start; min-height: 1.3em; }
      .talk-card-player { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .talk-card { grid-template-columns: 82px minmax(0, 1fr); gap: 12px; padding: 12px; }
      .talk-card-description { -webkit-line-clamp: 4; }
      .talk-card-actions { display: grid; grid-template-columns: 1fr; }
      .archive-link,
      .download-link { width: 100%; box-sizing: border-box; }
    }

    @media (max-width: 880px) {
      .hero { grid-template-columns: 1fr; gap: 26px; }
      .portrait { justify-self: start; max-width: 240px; }
      .subscribe-current { grid-template-columns: 1fr; align-items: start; }
      .listen-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
    @media (max-width: 520px) {
      main { padding: 34px 18px 56px; }
      .listen-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
  <main>
    <section class="hero" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">Alan Watts</h1>
      </div>
      <img class="portrait" src="/dharma/watts/artwork/alan-watts-podcast-cover.jpg" alt="Alan Watts">
    </section>
    <section class="archive" aria-labelledby="archive-heading">
      <p class="archive-kicker">Archive</p>
      <h2 id="archive-heading">Browse and listen</h2>
      <div class="archive-query">
        <div class="archive-search" role="search">
          <label class="sr-only" for="archive-search">Search talks</label>
          <input id="archive-search" type="search" autocomplete="off" spellcheck="false" placeholder="Search titles, descriptions, chapters">
          <div class="archive-filter-pills">
            <button class="starred-toggle" type="button" aria-pressed="false" data-starred-toggle>Starred</button>
          </div>
        </div>
      </div>
      <div class="result-bar">
        <p id="archive-summary" class="archive-copy">Loading talks...</p>
        <p id="archive-search-status" class="archive-search-status" aria-live="polite"></p>
      </div>
      <section class="subscribe-current" aria-labelledby="subscribe-current-heading">
        <div>
          <h3 id="subscribe-current-heading">Subscribe to results</h3>
          <p id="feed-copy" class="subscribe-copy">RSS reflects the current search.</p>
          <p id="copy-status" class="copy-status" aria-live="polite"></p>
        </div>
        <div class="listen-grid">
          <a class="listen-badge overcast" href="#" data-subscribe-target="overcast">
            <img src="https://cdn.simpleicons.org/overcast/FFFFFF?viewbox=auto" alt="">
            <span>Overcast</span>
          </a>
          <a class="listen-badge pocket" href="#" data-subscribe-target="pocket">
            <img src="https://cdn.simpleicons.org/pocketcasts/FFFFFF?viewbox=auto" alt="">
            <span>Pocket Casts</span>
          </a>
          <button class="listen-badge apple" type="button" data-copy-current-feed data-copy-message="RSS URL copied. In Apple Podcasts, choose Library, then Add a Show by URL.">
            <img src="https://cdn.simpleicons.org/applepodcasts/FFFFFF?viewbox=auto" alt="">
            <span>Apple Podcasts</span>
          </button>
          <button class="listen-badge youtube" type="button" data-copy-current-feed data-copy-message="RSS URL copied. In YouTube Music, choose Library, Podcasts, then Add podcast by RSS feed.">
            <img src="https://cdn.simpleicons.org/youtubemusic/FFFFFF?viewbox=auto" alt="">
            <span>YouTube Music</span>
          </button>
        </div>
      </section>
      <div id="talk-list" class="talk-list"></div>
      <div id="talk-loader" class="talk-loader" aria-live="polite">Loading talks...</div>
    </section>
  </main>
  </div>
  <script>
    window.TALK_ARCHIVE_CONFIG = {"corpus": "watts", "defaultScope": "all", "feedEndpoint": "/api/feeds/dharma.xml", "siteBaseUrl": "https://jeffharr.is/dharma/watts/", "talkPathPrefix": "talks/", "scopes": {"all": {"title": "All", "url": "talks.json", "count": 59}}};
  </script>
  <script src="archive-browser.js"></script>
  <script src="/js/admin-presence.js?v=2"></script>
</body>
</html>
