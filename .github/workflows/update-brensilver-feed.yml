name: Update Brensilver feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build feed
        run: python3 scripts/build-dharma-feed.py brensilver

      - name: Commit generated feed
        run: |
          if git diff --quiet -- dharma/brensilver; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "brensilver-feed-bot"
          git config user.email "brensilver-feed-bot@users.noreply.github.com"
          git add dharma/brensilver
          git commit -m "Update Brensilver podcast feed"
          git push
