name: Check Brensilver feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  check-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build checked-in feed artifacts
        run: python3 scripts/build-dharma-feed.py brensilver --talks-json dharma/brensilver/talks.json --copy-artwork

      - name: Check feed health
        run: python3 scripts/check-brensilver-feed-freshness.py --require-enriched-feed-items --freshness-grace-hours 12

      - name: Verify generated artifacts are committed
        run: |
          git diff --exit-code -- dharma/brensilver
