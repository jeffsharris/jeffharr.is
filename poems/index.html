<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poems | Jeff Harris</title>
  <meta name="description" content="Collections of words that I love.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/favorites.css?v=1">
  <style>
    :root {
      --bg: #FDFCFA;
      --bg-card: #FFFFFF;
      --bg-hover: #F8F6F3;
      --text: #2D2A26;
      --text-muted: #6B6560;
      --text-light: #9A9590;
      --accent: #6F5743;
      --accent-strong: #523F2F;
      --accent-light: rgba(111, 87, 67, 0.1);
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1918;
        --bg-card: #242220;
        --bg-hover: #2D2A28;
        --text: #E8E4DF;
        --text-muted: #9A9590;
        --text-light: #6B6560;
        --accent: #C9A877;
        --accent-strong: #DBBE8E;
        --accent-light: rgba(201, 168, 119, 0.16);
        --border: rgba(255, 255, 255, 0.1);
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 32px 24px 24px;
      text-align: center;
    }

    .header__back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 16px;
      transition: color 0.2s;
    }

    .header__back:hover {
      color: var(--accent);
    }

    .header__title {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 400;
      margin: 0 0 8px 0;
      letter-spacing: 0.02em;
    }

    .header__subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0;
    }

    /* Search Bar */
    .search-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .search {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .search__input {
      width: 100%;
      padding: 10px 36px 10px 38px;
      font-family: var(--font-sans);
      font-size: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search__input::placeholder {
      color: var(--text-light);
    }

    .search__input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .search__icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }

    .search__clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg-hover);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      transition: all 0.2s;
    }

    .search__clear:hover {
      background: var(--text-light);
      color: var(--bg);
    }

    .search__clear.visible {
      display: flex;
    }

    /* Filter Toggles */
    .filters {
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      padding: 8px 14px;
      font-family: var(--font-sans);
      font-size: 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .search-bar__count {
      font-size: 13px;
      color: var(--text-light);
      margin-left: auto;
    }

    /* Main */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Poem image cards */
    .card {
      position: relative;
      aspect-ratio: 1;
      cursor: pointer;
      background: #16120f;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
      transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .card.hidden {
      display: none;
    }

    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .card__image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1);
      transition: transform 0.6s ease, filter 0.4s ease;
      z-index: -2;
    }

    .card:hover .card__image,
    .card:focus-visible .card__image {
      transform: scale(1.045);
      filter: saturate(1.04) contrast(1.03);
    }

    .card__scrim {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent 0%, transparent 48%, rgba(0, 0, 0, 0.22) 72%, rgba(0, 0, 0, 0.62) 100%);
      z-index: -1;
      transition: opacity 0.3s ease;
    }

    .card:hover .card__scrim,
    .card:focus-visible .card__scrim {
      opacity: 0.85;
    }

    .card__front {
      position: absolute;
      inset: auto 0 0;
      min-height: 50%;
      padding: 72px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-align: center;
      opacity: 1;
    }

    .card:hover .card__front {
      opacity: 1;
    }

    .card__title {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #fff;
      line-height: 1.14;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      text-shadow:
        0 1px 2px rgba(0, 0, 0, 0.95),
        0 2px 14px rgba(0, 0, 0, 0.85),
        0 0 24px rgba(0, 0, 0, 0.55);
    }

    .card--long-title .card__front {
      min-height: 66%;
      padding-top: 88px;
    }

    .card--long-title .card__title {
      font-size: 1.28rem;
      line-height: 1.12;
    }

    .card--very-long-title .card__front {
      min-height: 82%;
      padding: 96px 20px 22px;
    }

    .card--very-long-title .card__title {
      font-size: 1.05rem;
      line-height: 1.1;
    }

    .card__author {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.86);
      font-style: italic;
      text-shadow:
        0 1px 2px rgba(0, 0, 0, 0.95),
        0 1px 10px rgba(0, 0, 0, 0.8);
    }

    /* Skeleton loading cards */
    .card--skeleton {
      cursor: default;
      pointer-events: none;
      background: var(--bg-hover);
      border-color: var(--border);
      box-shadow: none;
    }

    .card--skeleton::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 20%,
        color-mix(in srgb, var(--bg-card), transparent 30%) 50%,
        transparent 80%
      );
      transform: translateX(-100%);
      animation: card-shimmer 1.6s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes card-shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .card--skeleton::before { animation: none; opacity: 0.5; }
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: calc(16px + env(safe-area-inset-top, 0px)) 16px calc(16px + env(safe-area-inset-bottom, 0px));
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal.is-open {
      opacity: 1;
      visibility: visible;
    }

    .modal__overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }

    .modal__content {
      position: relative;
      width: 100%;
      max-width: 1080px;
      max-height: 90vh;
      max-height: 90dvh;
      display: flex;
      flex-direction: column;
      transform: scale(0.95) translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal.is-open .modal__content {
      transform: scale(1) translateY(0);
    }

    /* Clipping viewport — holds the sliding panes and bounds them to the
       card area, so chevrons (siblings outside this wrapper) stay visible. */
    .modal__viewport {
      position: relative;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* Inner pane — what slides during prev/next. */
    .modal__inner {
      position: relative;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
      background: var(--bg-card);
      will-change: transform;
    }

    .modal__inner--ghost {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .modal__header {
      padding: calc(32px + env(safe-area-inset-top, 0px)) 32px 0;
      text-align: center;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
      transition: padding 0.3s ease, border-color 0.3s ease;
    }

    .modal__title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 500;
      line-height: 1.25;
      margin: 0 0 12px 0;
      max-height: 200px;
      overflow: hidden;
      transition: font-size 0.3s ease, line-height 0.3s ease, margin 0.3s ease, max-height 0.3s ease;
    }

    .modal__author {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: normal;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      margin: 4px 0 0;
      max-height: 50px;
      overflow: hidden;
      opacity: calc(1 - var(--sp, 0) * 3);
      transition: opacity 0.15s ease, max-height 0.25s ease, margin 0.25s ease;
    }

    .modal__author-link {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .modal__author-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .modal__badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0;
      padding: 6px 12px;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--accent);
      font-style: normal;
    }

    .modal__badge svg {
      width: 14px;
      height: 14px;
    }

    .modal__meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      text-align: left;
      max-height: 100px;
      overflow: hidden;
      opacity: calc(1 - var(--sp, 0) * 2);
      transition: opacity 0.15s ease, max-height 0.25s ease, margin 0.25s ease;
    }

    .modal__actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      position: relative;
    }

    .modal__action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 13px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }

    .modal__action-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--shadow-lg);
    }

    .modal__action-btn:focus-visible,
    .modal__close:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .modal__action-btn svg {
      width: 16px;
      height: 16px;
      color: currentColor;
    }

    .modal__feedback {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .modal__feedback.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .modal__feedback.is-error {
      color: #B15B4A;
    }

    /* Hide share button on desktop - only show when Web Share API is available */
    #share-poem {
      display: none;
    }

    #share-poem.is-supported {
      display: inline-flex;
    }

    .modal__body {
      --reader-top: 28px;
      padding: 0;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .modal__reader {
      display: grid;
      grid-template-columns: minmax(260px, 34%) minmax(0, 1fr);
      gap: 34px;
      align-items: start;
      padding: var(--reader-top) 32px 32px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    }

    .modal__art {
      position: sticky;
      top: var(--reader-top);
      margin: 0;
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      background: #16120f;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .modal__art::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.22));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .modal__art img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .modal__text {
      min-width: 0;
    }

    .modal__poem {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      line-height: 1.78;
      margin: 0;
      text-align: left;
      max-width: 60ch;
      color: var(--text);
    }

    .modal__stanza {
      display: block;
      white-space: pre-line;
      margin: 0;
    }

    .modal__stanza + .modal__stanza {
      margin-top: 1.4em;
    }

    /* Prev / Next navigation — floats in the dim overlay, fully outside the card. */
    .modal__nav {
      position: absolute;
      top: 50%;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.92);
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transform: translateY(-50%);
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      z-index: 5;
      opacity: 0.92;
    }

    .modal__nav--prev { left: -66px; }
    .modal__nav--next { right: -66px; }

    .modal__nav:hover {
      opacity: 1;
      color: #fff;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-50%) scale(1.06);
    }

    .modal__nav:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.85);
      outline-offset: 3px;
    }

    .modal__nav[disabled] {
      opacity: 0;
      pointer-events: none;
    }

    .modal__nav svg { width: 18px; height: 18px; }

    /* Hide chevrons when the modal card would be too close to the viewport edge. */
    @media (max-width: 1180px) {
      .modal__nav { display: none; }
    }

    /* Swipe hint indicators (mobile) */
    .modal__swipe {
      position: absolute;
      top: 50%;
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--accent), transparent 60%);
      pointer-events: none;
      opacity: 0;
      transform: translate(0, -50%) scale(0.6);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 7;
    }

    .modal__swipe svg { width: 26px; height: 26px; }
    .modal__swipe--prev { left: 22px; transform: translate(-40px, -50%) scale(0.6); }
    .modal__swipe--next { right: 22px; transform: translate(40px, -50%) scale(0.6); }

    .modal__swipe.is-armed {
      transform: translate(0, -50%) scale(1.06);
    }

    /* Slide transition between poems — applied to .modal__inner. */
    .modal__inner.is-sliding {
      transition: transform 0.44s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .modal__inner.is-dragging {
      transition: none;
    }

    .modal__inner--ghost.is-sliding {
      transition: transform 0.44s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .modal__close {
      position: absolute;
      top: calc(16px + env(safe-area-inset-top, 0px));
      right: 16px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      z-index: 6;
    }

    .modal__close:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 64px;
      color: var(--text-muted);
    }

    /* Scrollbar (modal only) */
    .modal__body::-webkit-scrollbar {
      width: 6px;
    }

    .modal__body::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal__body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Collapsed header on scroll */
    .modal__content.is-scrolled .modal__header {
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      padding-bottom: 16px;
      padding-right: 72px;
      text-align: left;
      border-bottom-color: var(--border);
      box-shadow: 0 2px 14px color-mix(in srgb, var(--text), transparent 94%);
    }

    .modal__content.is-scrolled .modal__title {
      font-size: 0.95rem;
      line-height: 40px;
      max-height: 40px;
      margin-bottom: 0;
    }

    .modal__title.is-truncated {
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .modal__content.is-scrolled .modal__author {
      max-height: 0;
      margin: 0;
    }

    .modal__content.is-scrolled .modal__meta {
      max-height: 0;
      margin: 0;
    }

    /* Responsive */
    @media (min-width: 1200px) {
      .modal__content {
        max-width: 1120px;
      }

      .modal__poem {
        font-size: 1.25rem;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 24px 20px 20px;
      }

      .header__title {
        font-size: 2rem;
      }

      .search-bar {
        padding: 16px 20px;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .search {
        max-width: none;
      }

      .search__input {
        font-size: 16px;
      }

      .filters {
        justify-content: flex-start;
      }

      .search-bar__count {
        margin-left: 0;
        text-align: center;
      }

      .main {
        padding: 20px 16px 40px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        aspect-ratio: 1;
      }

      .card__front {
        padding: 68px 22px 22px;
      }

      .card__title {
        font-size: 1.45rem;
      }

      .modal {
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
      }

      .modal__content {
        max-height: 95vh;
        max-height: 95dvh;
        border-radius: 12px;
      }

      .modal__header {
        padding: 24px 24px 0;
      }

      .modal__title {
        font-size: 1.5rem;
        padding-right: 32px;
      }

      .modal__body {
        --reader-top: 16px;
        padding: 0;
      }

      .modal__reader {
        display: block;
        padding: 14px 0 calc(28px + env(safe-area-inset-bottom, 0px));
      }

      .modal__art {
        position: relative;
        top: auto;
        aspect-ratio: 5 / 4;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        box-shadow: none;
      }

      .modal__art::after {
        background: linear-gradient(180deg,
          rgba(0, 0, 0, 0.04) 0%,
          rgba(0, 0, 0, 0) 32%,
          rgba(0, 0, 0, 0) 60%,
          var(--bg-card) 100%);
      }

      .modal__text {
        padding: 4px 22px 0;
      }

      .modal__poem {
        font-size: 1.04rem;
        line-height: 1.78;
      }

      .modal__nav { display: none; }

      .modal__close {
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
      }

      .modal__content.is-scrolled .modal__header {
        padding: 12px 60px 12px 24px;
      }

      .modal__content.is-scrolled .modal__title {
        line-height: 36px;
        max-height: 36px;
      }
    }

    @media (max-width: 400px) {
      .header__title {
        font-size: 1.75rem;
      }

      .card {
        aspect-ratio: 1;
      }

      .card__title {
        font-size: 1.3rem;
      }

      .filter-btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      .modal__actions {
        justify-content: flex-end;
        gap: 6px;
      }

      .modal__action-btn {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="header__back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
    <h1 class="header__title">Poems</h1>
    <p class="header__subtitle"><em>collections of words I love</em></p>
  </header>

  <div class="search-bar">
    <div class="search">
      <svg class="search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" class="search__input" id="search" placeholder="Search titles, authors, or text..." autocomplete="off">
      <button class="search__clear" id="search-clear" aria-label="Clear search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="memorized">Memorized</button>
    </div>
    <span class="search-bar__count" id="count"></span>
  </div>

  <main class="main">
    <div class="grid" id="grid"></div>
  </main>

  <div class="modal" id="modal">
    <div class="modal__overlay"></div>
    <div class="modal__content">
      <button class="modal__nav modal__nav--prev" id="modal-prev" aria-label="Previous poem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 6l-6 6 6 6"/>
        </svg>
      </button>
      <button class="modal__nav modal__nav--next" id="modal-next" aria-label="Next poem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6l6 6-6 6"/>
        </svg>
      </button>
      <div class="modal__swipe modal__swipe--prev" id="modal-swipe-prev" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 6l-6 6 6 6"/>
        </svg>
      </div>
      <div class="modal__swipe modal__swipe--next" id="modal-swipe-next" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6l6 6-6 6"/>
        </svg>
      </div>
      <button class="modal__close" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="modal__viewport" id="modal-viewport">
      <div class="modal__inner" id="modal-inner">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title"></h2>
        <p class="modal__author">
          <a class="modal__author-link" id="modal-author"></a>
        </p>
        <div class="modal__meta">
          <div class="modal__badge" id="modal-badge" style="display: none;">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            Memorized
          </div>
          <div class="modal__actions">
            <button class="modal__action-btn" id="copy-poem" aria-label="Copy poem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <button class="modal__action-btn" id="share-poem" aria-label="Share poem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <path d="M8.59 13.51l6.83 3.98"></path>
                <path d="M15.41 6.51l-6.82 3.98"></path>
              </svg>
            </button>
            <button class="favorite-button" id="favorite-poem" aria-label="Favorite" data-favorite-kind="poem" hidden></button>
            <span class="modal__feedback" id="action-feedback" aria-live="polite"></span>
          </div>
        </div>
      </div>
      <div class="modal__body">
        <div class="modal__reader">
          <figure class="modal__art" id="modal-art">
            <img id="modal-image" alt="" width="1024" height="1024">
          </figure>
          <div class="modal__text">
            <p class="modal__poem" id="modal-poem"></p>
          </div>
        </div>
      </div>
      </div><!-- /modal__inner -->
      </div><!-- /modal__viewport -->
    </div>
  </div>

  <script src="/js/favorites.js?v=1"></script>
  <script>
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('search-clear');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalAuthor = document.getElementById('modal-author');
    const modalBadge = document.getElementById('modal-badge');
    const modalArt = document.getElementById('modal-art');
    const modalImage = document.getElementById('modal-image');
    const modalPoem = document.getElementById('modal-poem');
    const copyButton = document.getElementById('copy-poem');
    const shareButton = document.getElementById('share-poem');
    const favoriteButton = document.getElementById('favorite-poem');
    const actionFeedback = document.getElementById('action-feedback');
    const modalContent = modal.querySelector('.modal__content');
    const modalViewport = modal.querySelector('.modal__viewport');
    const modalInner = modal.querySelector('.modal__inner');
    const modalBody = modal.querySelector('.modal__body');

    let allPoems = [];
    let memorizedSet = new Set();
    let currentFilter = 'all';
    let currentSlug = '';
    let currentPoem = null;
    let feedbackTimeout;
    let truncateTimeout;
    let isAnimatingNav = false;

    const modalPrev = document.getElementById('modal-prev');
    const modalNext = document.getElementById('modal-next');
    const swipePrev = document.getElementById('modal-swipe-prev');
    const swipeNext = document.getElementById('modal-swipe-next');

    function renderSkeletonCards(count = 8) {
      const html = Array.from({ length: count })
        .map(() => '<div class="card card--skeleton" aria-hidden="true"></div>')
        .join('');
      grid.innerHTML = html;
    }

    renderSkeletonCards();

    // Show share button only if Web Share API is available
    if (navigator.share) {
      shareButton.classList.add('is-supported');
    }

    // Collapse header on scroll — scroll-progress driven fades + class toggle for layout
    modalBody.addEventListener('scroll', () => {
      const scrollY = modalBody.scrollTop;
      const progress = Math.min(1, Math.max(0, scrollY / 60));
      modalContent.style.setProperty('--sp', progress);

      const shouldCollapse = scrollY > 30;
      const isCollapsed = modalContent.classList.contains('is-scrolled');

      if (shouldCollapse !== isCollapsed) {
        modalContent.classList.toggle('is-scrolled', shouldCollapse);
        clearTimeout(truncateTimeout);
        if (shouldCollapse) {
          truncateTimeout = setTimeout(() => {
            modalTitle.classList.add('is-truncated');
          }, 300);
        } else {
          modalTitle.classList.remove('is-truncated');
        }
      }
    });

    async function writeToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'absolute';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();

      let success = false;
      try {
        success = document.execCommand('copy');
      } catch {
        success = false;
      }

      document.body.removeChild(textarea);

      if (!success) {
        throw new Error('Clipboard copy failed');
      }

      return true;
    }

    // Shuffle array (Fisher-Yates)
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getSlugFromLocation() {
      const params = new URLSearchParams(window.location.search);
      const hashSlug = window.location.hash.replace('#', '').trim();
      return params.get('poem') || hashSlug || '';
    }

    function setPoemUrl(slug, { method = 'replace' } = {}) {
      const url = new URL(window.location);
      if (slug) {
        url.searchParams.set('poem', slug);
      } else {
        url.searchParams.delete('poem');
      }
      const historyMethod = method === 'push' ? 'pushState' : 'replaceState';
      history[historyMethod](null, '', url);
    }

    function getPoemUrl() {
      const url = new URL(window.location);
      if (currentSlug) {
        url.searchParams.set('poem', currentSlug);
      }
      return url.toString();
    }

    function showFeedback(message, isError = false) {
      if (!actionFeedback) return;
      actionFeedback.textContent = message;
      actionFeedback.classList.toggle('is-error', isError);
      actionFeedback.classList.add('is-visible');
      clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        actionFeedback.classList.remove('is-visible');
      }, 2200);
    }

    function resetFeedback() {
      if (!actionFeedback) return;
      actionFeedback.textContent = '';
      actionFeedback.classList.remove('is-visible', 'is-error');
      clearTimeout(feedbackTimeout);
    }

    function escapeHtml(value = '') {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function escapeAttribute(value = '') {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }

    // Parse markdown frontmatter and content
    function parsePoem(markdown) {
      const match = markdown.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
      if (!match) return null;

      const frontmatter = parseFrontmatter(match[1]);
      const content = match[2].trim();

      const title = frontmatter.title || 'Untitled';
      const author = frontmatter.author || 'Unknown';

      return { title, author, content };
    }

    function parseFrontmatter(block = '') {
      return block.split('\n').reduce((acc, line) => {
        const [rawKey, ...rest] = line.split(':');
        if (!rawKey || rest.length === 0) return acc;
        const key = rawKey.trim().toLowerCase();
        const value = rest.join(':').trim();
        acc[key] = value;
        return acc;
      }, {});
    }

    // Create card element
    function createCard(poem, isMemorized) {
      const card = document.createElement('div');
      const titleLengthClass = poem.title.length > 70
        ? ' card--very-long-title'
        : poem.title.length > 42
          ? ' card--long-title'
          : '';
      card.className = `card${titleLengthClass}`;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Open ${poem.title} by ${poem.author}`);
      card.dataset.title = poem.title.toLowerCase();
      card.dataset.author = poem.author.toLowerCase();
      card.dataset.content = poem.content.toLowerCase();
      card.dataset.memorized = isMemorized ? 'true' : 'false';
      card.dataset.slug = poem.slug || '';

      card.innerHTML = `
        ${poem.image ? `<img class="card__image" src="${escapeAttribute(poem.image)}" alt="" width="1024" height="1024" loading="lazy" decoding="async">` : ''}
        <span class="favorite-indicator favorite-indicator--corner" hidden data-favorite-kind="poem" data-favorite-poem-slug="${escapeAttribute(poem.slug || '')}" aria-hidden="true"></span>
        <div class="card__scrim" aria-hidden="true"></div>
        <div class="card__front">
          <h2 class="card__title">${escapeHtml(poem.title)}</h2>
          <p class="card__author">${escapeHtml(poem.author)}</p>
        </div>
      `;

      card.addEventListener('click', () => {
        openModal(poem, isMemorized);
      });
      card.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        openModal(poem, isMemorized);
      });

      return card;
    }

    function renderPoemStanzas(content) {
      const stanzas = String(content || '')
        .replace(/\r\n/g, '\n')
        .trim()
        .split(/\n[ \t]*\n+/);
      return stanzas
        .map((stanza) => `<span class="modal__stanza">${escapeHtml(stanza.replace(/^\n+|\n+$/g, ''))}</span>`)
        .join('');
    }

    // Open modal
    function openModal(poem, isMemorized, { historyMethod = 'push' } = {}) {
      modalTitle.textContent = poem.title;
      modalAuthor.textContent = poem.author;
      modalPoem.innerHTML = renderPoemStanzas(poem.content);
      if (poem.image) {
        modalImage.src = poem.image;
        modalImage.alt = `Companion image for ${poem.title}`;
        modalArt.hidden = false;
      } else {
        modalImage.removeAttribute('src');
        modalImage.alt = '';
        modalArt.hidden = true;
      }
      if (modalBadge) {
        modalBadge.style.display = isMemorized ? 'inline-flex' : 'none';
      }
      currentSlug = poem.slug || '';
      currentPoem = poem;
      if (favoriteButton) {
        favoriteButton.dataset.favoritePoemSlug = currentSlug;
        window.Favorites?.scheduleRefresh(modal);
      }
      setPoemUrl(currentSlug, { method: historyMethod });
      resetFeedback();
      modalBody.scrollTop = 0;
      modalContent.classList.remove('is-scrolled');
      modalContent.style.setProperty('--sp', '0');
      modalTitle.classList.remove('is-truncated');
      clearTimeout(truncateTimeout);
      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
      updateNavButtons();
    }

    // Close modal
    function closeModal() {
      modal.classList.remove('is-open');
      document.body.style.overflow = '';
      currentSlug = '';
      currentPoem = null;
      setPoemUrl('');
      resetFeedback();
    }

    async function copyPoemToClipboard() {
      const poemText = currentPoem ? currentPoem.content : (modalPoem.textContent || '');
      try {
        await writeToClipboard(poemText);
        showFeedback('Copied poem');
      } catch {
        showFeedback('Unable to copy', true);
      }
    }

    // Visible card order (after filter/search) — defines prev/next navigation set.
    function getVisibleSlugs() {
      return Array.from(grid.querySelectorAll('.card:not(.hidden):not(.card--skeleton)'))
        .map((card) => card.dataset.slug)
        .filter(Boolean);
    }

    function getNeighbourSlug(direction) {
      const slugs = getVisibleSlugs();
      if (!slugs.length) return '';
      const index = slugs.indexOf(currentSlug);
      if (index === -1) return '';
      const nextIndex = direction === 'next' ? index + 1 : index - 1;
      return slugs[nextIndex] || '';
    }

    function updateNavButtons() {
      const slugs = getVisibleSlugs();
      const index = slugs.indexOf(currentSlug);
      const hasPrev = index > 0;
      const hasNext = index !== -1 && index < slugs.length - 1;
      modalPrev.toggleAttribute('disabled', !hasPrev);
      modalNext.toggleAttribute('disabled', !hasNext);
    }

    function navigateToNeighbour(direction, { source = 'click' } = {}) {
      if (isAnimatingNav) return;
      const targetSlug = getNeighbourSlug(direction);
      if (!targetSlug) return;
      const targetPoem = allPoems.find((p) => p.slug === targetSlug);
      if (!targetPoem) return;
      const isMemorized = memorizedSet.has(targetSlug);

      isAnimatingNav = true;

      // Snapshot the visible card as a ghost, preserving any drag offset and scroll position.
      const dragTransform = modalInner.style.transform;
      const oldScrollTop = modalBody.scrollTop;
      const ghost = modalInner.cloneNode(true);
      ghost.removeAttribute('id');
      ghost.classList.add('modal__inner--ghost');
      ghost.classList.remove('is-sliding', 'is-dragging');
      if (dragTransform) ghost.style.transform = dragTransform;
      modalViewport.insertBefore(ghost, modalInner);
      const ghostBody = ghost.querySelector('.modal__body');
      if (ghostBody) ghostBody.scrollTop = oldScrollTop;

      // Place the real inner offscreen on the entry side (no transition).
      modalInner.classList.remove('is-sliding');
      modalInner.classList.add('is-dragging');
      const inX = direction === 'next' ? '100%' : '-100%';
      modalInner.style.transform = `translateX(${inX})`;

      // Render the new poem into the real inner.
      openModal(targetPoem, isMemorized, { historyMethod: 'push' });

      // openModal may run additional layout; re-assert entry transform.
      modalInner.style.transform = `translateX(${inX})`;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          modalInner.classList.remove('is-dragging');
          modalInner.classList.add('is-sliding');
          ghost.classList.add('is-sliding');
          const outX = direction === 'next' ? '-100%' : '100%';
          ghost.style.transform = `translateX(${outX})`;
          modalInner.style.transform = 'translateX(0)';
        });
      });

      setTimeout(() => {
        if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
        modalInner.classList.remove('is-sliding');
        modalInner.style.transform = '';
        isAnimatingNav = false;
        updateNavButtons();
      }, 500);
    }

    modalPrev.addEventListener('click', (e) => {
      e.stopPropagation();
      navigateToNeighbour('prev');
    });
    modalNext.addEventListener('click', (e) => {
      e.stopPropagation();
      navigateToNeighbour('next');
    });

    async function sharePoemLink() {
      const url = getPoemUrl();
      const shareData = {
        url
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
          showFeedback('Sharing link...');
          return;
        } catch (error) {
          if (error?.name === 'AbortError') return;
        }
      }

      try {
        await writeToClipboard(url);
        showFeedback('Link copied');
      } catch {
        showFeedback('Unable to copy link', true);
      }
    }

    // Author link click - search by author
    if (modalAuthor) {
      modalAuthor.addEventListener('click', (e) => {
        e.preventDefault();
        const authorName = modalAuthor.textContent;
        closeModal();
        searchInput.value = authorName;
        searchClear.classList.add('visible');
        filterPoems(authorName);
      });
    }

    modal.querySelector('.modal__overlay').addEventListener('click', closeModal);
    modal.querySelector('.modal__close').addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        return;
      }
      if (!modal.classList.contains('is-open')) return;
      const target = e.target;
      const isEditable = target && (
        target.tagName === 'INPUT' ||
        target.tagName === 'TEXTAREA' ||
        target.isContentEditable
      );
      if (isEditable) return;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        navigateToNeighbour('prev');
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        navigateToNeighbour('next');
      }
    });

    // Touch swipe to switch poems (mobile gesture).
    (function attachSwipeNav() {
      const SWIPE_COMMIT = 80;       // px to commit
      const SWIPE_ARM = 50;          // px to "arm" hint pop
      const HORIZONTAL_DOM = 1.6;    // |dx| must dominate |dy| by this ratio
      const START_THRESHOLD = 10;    // px before we claim the gesture
      let startX = 0;
      let startY = 0;
      let active = false;
      let claimed = false;
      let direction = null;
      let pointerId = null;

      function reset(animateBack) {
        active = false;
        claimed = false;
        direction = null;
        pointerId = null;
        swipePrev.classList.remove('is-armed');
        swipeNext.classList.remove('is-armed');
        swipePrev.style.opacity = '';
        swipeNext.style.opacity = '';
        swipePrev.style.transform = '';
        swipeNext.style.transform = '';
        modalInner.classList.remove('is-dragging');
        if (animateBack) {
          modalInner.classList.add('is-sliding');
          modalInner.style.transform = 'translateX(0)';
          setTimeout(() => {
            modalInner.classList.remove('is-sliding');
            modalInner.style.transform = '';
          }, 260);
        } else {
          modalInner.classList.remove('is-sliding');
          modalInner.style.transform = '';
        }
      }

      function onPointerDown(e) {
        if (!modal.classList.contains('is-open')) return;
        if (isAnimatingNav) return;
        if (e.pointerType !== 'touch') return;
        // Ignore drags that begin on interactive elements that should swallow the gesture.
        const t = e.target;
        if (t.closest && t.closest('button, a, input, textarea, audio, video, [contenteditable]')) return;
        startX = e.clientX;
        startY = e.clientY;
        active = true;
        claimed = false;
        direction = null;
        pointerId = e.pointerId;
        try { modalContent.setPointerCapture(e.pointerId); } catch {}
      }

      function onPointerMove(e) {
        if (!active) return;
        if (e.pointerId !== pointerId) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (!claimed) {
          if (Math.abs(dx) < START_THRESHOLD && Math.abs(dy) < START_THRESHOLD) return;
          // Decide: is this a horizontal swipe?
          if (Math.abs(dx) > Math.abs(dy) * HORIZONTAL_DOM) {
            claimed = true;
            modalInner.classList.add('is-dragging');
          } else {
            // Vertical scroll dominates → release the gesture.
            reset(false);
            return;
          }
        }

        direction = dx < 0 ? 'next' : 'prev';
        const hasNeighbour = !!getNeighbourSlug(direction);
        const damp = hasNeighbour ? 1 : 0.28; // resistive feel at ends
        const dragX = dx * damp;
        modalInner.style.transform = `translateX(${dragX}px)`;

        // Swipe-hint indicators
        const hint = direction === 'next' ? swipeNext : swipePrev;
        const otherHint = direction === 'next' ? swipePrev : swipeNext;
        otherHint.style.opacity = '0';

        if (hasNeighbour) {
          const hintProgress = Math.min(1, Math.abs(dragX) / SWIPE_COMMIT);
          hint.style.opacity = String(hintProgress);
          const baseX = direction === 'next' ? 40 : -40;
          const offsetX = baseX * (1 - hintProgress);
          hint.style.transform = `translate(${offsetX}px, -50%) scale(${0.6 + 0.4 * hintProgress})`;
          hint.classList.toggle('is-armed', Math.abs(dragX) >= SWIPE_ARM);
        } else {
          hint.style.opacity = '0';
        }
      }

      function onPointerUp(e) {
        if (!active) return;
        if (e.pointerId !== pointerId) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (!claimed) { reset(false); return; }

        const horizontal = Math.abs(dx) > Math.abs(dy) * HORIZONTAL_DOM;
        const dir = dx < 0 ? 'next' : 'prev';
        const target = getNeighbourSlug(dir);

        if (horizontal && Math.abs(dx) >= SWIPE_COMMIT && target) {
          // Commit: hide hints and trigger animated transition.
          swipePrev.classList.remove('is-armed');
          swipeNext.classList.remove('is-armed');
          swipePrev.style.opacity = '';
          swipeNext.style.opacity = '';
          swipePrev.style.transform = '';
          swipeNext.style.transform = '';
          // navigateToNeighbour reads modalInner.style.transform to clone the ghost
          // at the current drag offset, so leave it untouched.
          navigateToNeighbour(dir, { source: 'swipe' });
          active = false;
          claimed = false;
          direction = null;
          pointerId = null;
        } else {
          reset(true);
        }
      }

      modalContent.addEventListener('pointerdown', onPointerDown);
      modalContent.addEventListener('pointermove', onPointerMove);
      modalContent.addEventListener('pointerup', onPointerUp);
      modalContent.addEventListener('pointercancel', () => reset(true));
    })();
    copyButton.addEventListener('click', (e) => {
      e.stopPropagation();
      copyPoemToClipboard();
    });
    shareButton.addEventListener('click', (e) => {
      e.stopPropagation();
      sharePoemLink();
    });

    // Filter buttons
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        filterPoems(searchInput.value);
      });
    });

    // Search/filter
    function filterPoems(query) {
      const q = query.toLowerCase().trim();
      let visible = 0;
      let total = 0;

      document.querySelectorAll('.card:not(.card--skeleton)').forEach(card => {
        const title = card.dataset.title;
        const author = card.dataset.author;
        const content = card.dataset.content;
        const isMemorized = card.dataset.memorized === 'true';

        // Check filter
        const passesFilter = currentFilter === 'all' ||
          (currentFilter === 'memorized' && isMemorized);

        // Check search (title, author, or poem text)
        const matchesSearch = !q ||
          title.includes(q) ||
          author.includes(q) ||
          content.includes(q);

        const show = passesFilter && matchesSearch;
        card.classList.toggle('hidden', !show);

        if (passesFilter) total++;
        if (show) visible++;
      });

      // Update count
      const filterLabel = currentFilter === 'memorized' ? 'memorized' : 'total';
      if (q) {
        countEl.textContent = `${visible} of ${total} poems`;
      } else {
        countEl.textContent = `${visible} poems`;
      }

      if (modal.classList.contains('is-open')) {
        updateNavButtons();
      }
    }

    searchInput.addEventListener('input', (e) => {
      filterPoems(e.target.value);
      searchClear.classList.toggle('visible', e.target.value.length > 0);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      filterPoems('');
      searchInput.focus();
    });

    function openPoemBySlug(slug, { historyMethod = 'replace' } = {}) {
      const poem = allPoems.find((p) => p.slug === slug);
      if (!poem) return false;
      const isMemorized = memorizedSet.has(slug);
      openModal(poem, isMemorized, { historyMethod });
      return true;
    }

    function handlePopstate() {
      const slug = getSlugFromLocation();
      if (slug) {
        openPoemBySlug(slug, { historyMethod: 'replace' });
      } else if (modal.classList.contains('is-open')) {
        modal.classList.remove('is-open');
        document.body.style.overflow = '';
        currentSlug = '';
        resetFeedback();
      }
    }

    // Load poems
    async function loadPoems() {
      try {
        const manifestRes = await fetch('/poems/manifest.json');
        if (!manifestRes.ok) throw new Error('Manifest unavailable');
        const manifest = await manifestRes.json();
        const imageMap = manifest.images || {};

        // Combine memorized and learning into single list
        const memorizedSlugs = manifest.memorized || [];
        const learningSlugs = manifest.learning || [];
        const allSlugs = [...memorizedSlugs, ...learningSlugs];
        memorizedSet = new Set(memorizedSlugs);

        const poems = await Promise.all(
          allSlugs.map(async (slug) => {
            try {
              const res = await fetch(`/poems/content/${slug}.md`);
              if (!res.ok) return null;
              const markdown = await res.text();
              const poem = parsePoem(markdown);
              if (poem) poem.slug = slug;
              if (poem) poem.image = imageMap[slug] || '';
              return poem;
            } catch {
              return null;
            }
          })
        );

        const validPoems = poems.filter(Boolean);
        const randomized = shuffle(validPoems);

        allPoems = validPoems;

        grid.innerHTML = '';
        randomized.forEach((poem) => {
          const isMemorized = memorizedSet.has(poem.slug);
          grid.appendChild(createCard(poem, isMemorized));
        });
        window.Favorites?.scheduleRefresh(grid);
        countEl.textContent = `${validPoems.length} poems`;

        const initialSlug = getSlugFromLocation();
        if (initialSlug) {
          const opened = openPoemBySlug(initialSlug, { historyMethod: 'replace' });
          if (!opened) {
            setPoemUrl('');
          }
        }

      } catch (error) {
        grid.innerHTML = '<div class="loading">Unable to load poems</div>';
        console.error('Failed to load poems:', error);
      }
    }

    window.addEventListener('popstate', handlePopstate);
    loadPoems();
  </script>
  <script src="/js/admin-presence.js?v=2"></script>
</body>
